[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sample-project"
version = "1.0.0"
description = "A sample project for testing"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "Alice Developer", email = "alice@example.com" },
    { name = "Bob Engineer", email = "bob@example.com" }
]
dependencies = [
    "requests>=2.28.0",
    "click>=8.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=23.0.0",
    "ruff>=0.0.270",
]
docs = [
    "mkdocs>=1.4.0",
    "mkdocs-material>=9.0.0",
]

[project.scripts]
myapp = "sample_project.main:main"
cli-tool = "sample_project.cli:cli"

[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311']

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
