[project]
name = "myproject"
version = "0.1.0"
description = "A sample project for testing drift"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "rich>=13.0",
]
optional-dependencies = { dev = ["pytest>=7.0"], docs = ["mkdocs>=1.5"] }
license = { text = "MIT" }
authors = [{ name = "Alice Dev", email = "alice@example.com" }]

[project.scripts]
mycli = "myproject.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.drift]
enabled = true
min-confidence = 0.8

[tool.pytest.ini_options]
testpaths = ["tests"]