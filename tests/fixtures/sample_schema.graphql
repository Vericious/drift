type Query {
  user(id: ID!): User
  users(limit: Int, offset: Int): [User!]!
  currentUser: User
  posts(search: String): [Post!]!
}

type Mutation {
  createUser(input: CreateUserInput!): User!
  deleteUser(id: ID!): Boolean!
  updatePost(id: ID!, input: UpdatePostInput!): Post!
}

type Subscription {
  newPost: Post!
  userUpdated(id: ID!): User!
}

type User {
  id: ID!
  name: String!
  email: String!
  createdAt: DateTime!
}

type Post {
  id: ID!
  title: String!
  body: String!
  author: User!
  publishedAt: DateTime
  tags: [String!]!
}

input CreateUserInput {
  name: String!
  email: String!
  password: String!
}

input UpdatePostInput {
  title: String
  body: String
  tags: [String!]
}

enum UserRole {
  ADMIN
  EDITOR
  VIEWER
}

enum PostStatus {
  DRAFT
  PUBLISHED
  ARCHIVED
}
