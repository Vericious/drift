# Sample YAML configuration for testing the ConfigFileExtractor
database:
  host: localhost
  port: 5432
  ssl: true
  pools:
    min: 2
    max: 10

server:
  host: 0.0.0.0
  port: 8080
  debug: false
  workers: 4

logging:
  level: info
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - console
    - file

app:
  name: myapp
  version: 1.0.0
