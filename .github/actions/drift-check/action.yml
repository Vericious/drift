name: "drift-check"
description: "Check for documentation drift using drift"
inputs:
  paths:
    description: "Paths to scan for documentation drift"
    required: false
    default: "."
  severity:
    description: "Minimum severity to report (error, warning, info, all)"
    required: false
    default: "all"
  fail-on:
    description: "Exit code 1 when drift items at this severity are found (error, warning, info, none)"
    required: false
    default: "error"
  token:
    description: "GitHub token for SARIF upload"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Install drift
      shell: bash
      run: |
        pip install --upgrade pip
        pip install drift

    - name: Run drift scan
      id: drift-scan
      shell: bash
      run: |
        # Run drift scan and capture output
        drift scan ${{ inputs.paths }} --sarif --output drift-results.sarif --severity ${{ inputs.severity }} --fail-on ${{ inputs.fail-on }}

    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: drift-results.sarif
        category: drift

    - name: Check for drift
      shell: bash
      run: |
        # If drift scan exited non-zero, we have drift to report
        if [ -f drift-results.sarif ]; then
          drift_count=$(grep -c '"ruleId"' drift-results.sarif || echo "0")
          echo "::notice::Drift found: $drift_count issue(s)"
        fi
