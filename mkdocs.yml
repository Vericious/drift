site_name: Drift
site_description: Detect when your documentation no longer matches your code.
site_url: https://github.com/yourusername/drift

repo_name: yourusername/drift
repo_url: https://github.com/yourusername/drift

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy

nav:
  - Home: index.md
  - Extractors: extractors.md
  - Plugins: plugins.md
  - Configuration: configuration.md
  - CLI Reference: cli.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - tables
  - toc:
      permalink: true
